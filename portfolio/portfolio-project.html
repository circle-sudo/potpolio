<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>

particlesJS("particles-js", {
  particles: {
    number: {
      value: 80
    },
    color: {
      value: "#ffffff"
    },
    shape: {
      type: "circle"
    },
    opacity: {
      value: 0.5
    },
    size: {
      value: 3
    },
    line_linked: {
      enable: true,
      distance: 150,
      color: "#ffffff",
      opacity: 0.4,
      width: 1
    },
    move: {
      enable: true,
      speed: 3
    }
  }
});

</script>
