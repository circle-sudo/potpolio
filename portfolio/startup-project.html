<!DOCTYPE html>
<html lang="ko">

<head>

<style>

/* 파티클 배경 */

#particles-js{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
background:#0d1117;
}

/* 콘텐츠 위로 + 글씨 흰색 */

section{
position:relative;
z-index:1;
color:white;
}

</style>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Startup Vision</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="particles-js"></div>

<header>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="index.html">← Back</a>

</div>

</nav>

</header>

<section class="container text-center my-5">

<h1>Startup Vision</h1>

<p class="lead">
기술 기반 스타트업 아이디어를 정리한 프로젝트입니다.
</p>

<p>
이 프로젝트는 기술과 비즈니스를 결합한
스타트업 아이디어를 연구하는 개인 프로젝트입니다.

글로벌 서비스를 만드는 전략을 연구하며
궁극적으로 1인 유니콘 기업을 만드는 것을 목표로 합니다.
</p>

</section>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>

particlesJS("particles-js", {
particles: {
number: { value: 80 },
color: { value: "#ffffff" },
shape: { type: "circle" },
opacity: { value: 0.5 },
size: { value: 3 },
line_linked: {
enable: true,
distance: 150,
color: "#ffffff",
opacity: 0.4,
width: 1
},
move: {
enable: true,
speed: 3
}
}
});

</script>

</body>
</html>
